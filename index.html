<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypingRush - 打字练习</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle" title="切换主题">🌙</button>
        <button id="settingsBtn" class="settings-btn" title="设置">&#x2699;</button>
      </div>
      <h1 class="logo">⌨️ TypingRush</h1>
      <p class="subtitle">提升你的打字速度</p>
    </header>

    <!-- 语言选择 -->
    <section class="language-section">
      <h2>选择语言</h2>
      <div class="language-grid" id="languageGrid"></div>
    </section>

    <!-- 文章列表 -->
    <section class="article-section" id="articleSection" style="display: none;">
      <button class="back-btn" id="backBtn">← 返回</button>
      <h2>选择文章</h2>
      <div class="article-list" id="articleList"></div>
    </section>

    <!-- 排行榜 -->
    <section class="ranking-section" id="rankingSection" style="display: none;">
      <button class="back-btn" id="rankingBackBtn">← 返回文章</button>
      <h2>🏆 排行榜</h2>
      <div class="ranking-list" id="rankingList"></div>
    </section>

    <!-- 设置面板 -->
    <div id="settingsPanel" class="settings-panel" style="display: none;">
      <div class="settings-content">
        <h3>设置</h3>

        <h4>GitHub Gist 云同步</h4>
        <p class="settings-desc">
          使用 GitHub Gist 同步排行榜数据到云端。需要创建一个
          <a href="https://github.com/settings/tokens" target="_blank">GitHub Personal Access Token</a>，
          权限选择 <strong>gist</strong> 即可。
        </p>

        <div id="gistStatus" class="gist-status unsynced">未同步</div>

        <input id="gistToken" type="password" placeholder="输入 GitHub Token">
        <button id="saveTokenBtn" class="btn-primary" style="width:100%;margin-bottom:10px;">保存 Token</button>

        <div id="syncActions" style="display:none;">
          <button id="syncBtn" class="btn-primary" style="width:100%;margin-bottom:10px;">同步排行榜</button>
          <button id="unsyncBtn" class="btn-secondary" style="width:100%;">解除同步</button>
          <p id="lastSyncTime" class="settings-desc" style="margin-top:10px;"></p>
        </div>

        <div id="syncMessage"></div>

        <button id="settingsCloseBtn" class="btn-secondary" style="width:100%;margin-top:20px;">关闭</button>
      </div>
    </div>

    <!-- 模式选择弹窗 -->
    <div id="modeModal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>选择练习模式</h2>
        <div class="mode-options">
          <div class="mode-card" data-mode="timed">
            <span class="mode-icon">⏱️</span>
            <span class="mode-name">计时模式</span>
            <span class="mode-desc">60秒限时，挑战速度极限</span>
          </div>
          <div class="mode-card" data-mode="endless">
            <span class="mode-icon">♾️</span>
            <span class="mode-name">无时限模式</span>
            <span class="mode-desc">不限时，专注完成整篇文章</span>
          </div>
        </div>
        <button id="modeCancelBtn" class="btn-secondary" style="width:100%;margin-top:20px;">取消</button>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    <a href="https://github.com/hutiger9" target="_blank" title="GitHub">

    </a>
    <a href="mailto:2532725615@qq.com" title="邮箱">

  <script type="module" src="index.js"></script>
</body>
</html>
