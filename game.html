<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypingRush - 游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <button class="back-btn" onclick="goBack()">← 返回</button>
      <h1 id="articleTitle">文章标题</h1>
      <span id="langBadge" class="badge lang" style="display:none;"></span>
      <span id="modeBadge" class="mode-badge timed">计时模式</span>
      <button id="themeToggle" class="theme-toggle" title="切换主题" style="margin-left:8px;">🌙</button>
    </header>

    <div class="game-stats">
      <div class="stat-item">
        <span id="time">60</span>
        <p>时间</p>
      </div>
      <div class="stat-item">
        <span id="wpm">0</span>
        <p>WPM</p>
      </div>
      <div class="stat-item">
        <span id="accuracy">100</span>
        <p>准确率</p>
      </div>
      <div class="stat-item">
        <span id="progress">0%</span>
        <p>进度</p>
      </div>
    </div>

    <div id="descriptionArea" class="description-area" style="display: none;">
      <h3>题目描述</h3>
      <p id="articleDescription"></p>
    </div>

    <div class="typing-area">
      <div id="textDisplay" class="text-display"></div>
      <input id="input" type="text" autocomplete="off" placeholder="点击这里开始输入...">
    </div>

    <div class="game-controls">
      <button id="restartBtn" class="btn-primary">重新开始</button>
    </div>

    <div id="resultModal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>🎉 完成！</h2>
        <div class="result-stats">
          <div><span id="resultWpm">0</span><p>WPM</p></div>
          <div><span id="resultAccuracy">0</span><p>准确率</p></div>
          <div><span id="resultTime">0</span><p>用时</p></div>
        </div>
        <input id="playerName" type="text" placeholder="输入你的名字保存成绩">
        <div class="modal-actions">
          <button class="btn-primary" id="saveBtn">保存成绩</button>
          <button class="btn-secondary" id="closeBtn">关闭</button>
        </div>
      </div>
    </div>

  </div>
